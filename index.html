<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="icons/favicon.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <style>
    :root{
      --bg:#f3f5f9; --bg-alt:#eef1f6; --card:#ffffff; --ink:#101828; --muted:#64748b; --line:#e3e7ee;
      --brand:#001B3D; --brand-2:#1c2a45; --forest:#1f4d3a; --forest-2:#163b2c; --gold:#c28e2c; --gold-soft:#f3e3bd;
      --ok:#0f7a4d; --ok-bg:#e3f6ec; --warn:#b6790a; --warn-bg:#fdf1dc; --bad:#b3261e; --bad-bg:#fbe9e7; --blue:#2457a6; --blue-bg:#e7eefc;
      --radius-lg:20px; --radius-md:14px; --radius-sm:10px;
      --shadow-card:0 1px 2px rgba(16,24,40,.05), 0 10px 24px -14px rgba(16,24,40,.18);
      --shadow-pop:0 16px 40px -10px rgba(16,24,40,.35);
      --serif:Georgia,'Iowan Old Style','Times New Roman',serif;
      --sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:
      radial-gradient(1100px 420px at 100% -10%, rgba(194,142,44,.08), transparent 60%),
      radial-gradient(900px 380px at -10% 0%, rgba(15,23,42,.05), transparent 55%),
      var(--bg);
      font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
    h1,h2,h3{font-family:var(--serif)}
    a{color:inherit}
    ::selection{background:var(--gold-soft)}
    :focus-visible{outline:2px solid var(--gold);outline-offset:2px}

    header{position:sticky;top:0;z-index:5;background:var(--brand);color:#fff;padding:14px 16px;box-shadow:0 4px 18px rgba(15,23,42,.28);border-bottom:2px solid var(--gold)}
    .headerRow{display:flex;align-items:center;gap:12px;max-width:980px;margin:0 auto}
    .brandLogo{width:42px;height:42px;flex:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.35))}
    .headerText{min-width:0;flex:1}
    .headerRefreshBtn{margin-left:auto;flex:none;border:0;background:rgba(255,255,255,.12);color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .15s ease,transform .3s ease}
    .headerRefreshBtn:hover{background:rgba(255,255,255,.22)}
    .headerRefreshBtn:active svg{transform:rotate(180deg)}
    .headerRefreshBtn svg{width:18px;height:18px;transition:transform .3s ease}
    header h1{font-size:19px;margin:0;letter-spacing:.2px;font-weight:700}
    header p{margin:3px 0 0;color:#cbd5e1;font-size:12px;letter-spacing:.3px}

    main{max-width:980px;margin:0 auto;padding:12px 12px 84px;flex:1;min-width:0}
    @media(min-width:900px){main{padding-bottom:24px}}
    .appShell{display:flex;flex-direction:column}
    nav{display:flex;justify-content:space-around;align-items:stretch;gap:2px;position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);z-index:20;padding:6px 4px 10px;box-shadow:0 -2px 10px rgba(0,0,0,.06)}
    nav button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:0;background:transparent;padding:6px 2px;font-weight:700;color:#94a3b8;font-size:10px;font-family:inherit;transition:color .15s ease;flex:1;min-width:0}
    nav button svg{width:20px;height:20px;flex:none}
    nav button .navLabel{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    nav button:active{transform:scale(.95)}
    nav button.active{color:var(--brand)}
    @media(min-width:900px){
      .appShell{flex-direction:row}
      nav{position:sticky;top:0;left:auto;right:auto;bottom:auto;flex-direction:column;justify-content:flex-start;align-items:stretch;width:200px;flex:none;height:calc(100vh - 71px);border-top:0;border-right:1px solid var(--line);box-shadow:none;padding:16px 0;gap:0}
      nav button{flex-direction:row;justify-content:flex-start;gap:10px;padding:11px 20px;font-size:13px;border-left:3px solid transparent}
      nav button svg{width:18px;height:18px}
      nav button.active{background:var(--gold-soft);border-left:3px solid var(--gold)}
    }

    .grid{display:grid;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-card)}
    .card h2{font-size:17px;margin:0 0 10px;color:var(--brand);display:flex;align-items:center;gap:8px}
    .card h2::before{content:'';width:4px;height:16px;border-radius:2px;background:var(--gold);display:inline-block}
    .card h3{font-size:15px;margin:0 0 8px;color:var(--brand-2)}
    .sub{color:var(--muted);font-size:13px;margin-top:-4px;margin-bottom:10px;line-height:1.45}

    label{display:block;font-weight:700;font-size:12px;margin:10px 0 5px;color:#374151}
    input,select,textarea{width:100%;font:inherit;border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px;background:#fff;color:var(--ink);transition:border-color .15s ease,box-shadow .15s ease}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(15,23,42,.10)}
    textarea{min-height:74px}
    .row{display:grid;gap:10px;grid-template-columns:1fr 1fr}
    @media(max-width:640px){.row{grid-template-columns:1fr}}

    .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    button{cursor:pointer;font-family:inherit}
    .btn{border:0;border-radius:var(--radius-sm);padding:11px 15px;font-weight:800;font-size:13.5px;background:var(--brand);color:#fff;transition:filter .15s ease,transform .1s ease,box-shadow .15s ease;box-shadow:0 1px 2px rgba(15,23,42,.15)}
    .btn:hover{filter:brightness(1.12)}
    .btn:active{transform:translateY(1px)}
    .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}
    .btn.secondary:hover{border-color:#94a3b8;background:#f8fafc}
    .btn.blue{background:var(--blue)}
    .btn.ok{background:var(--forest)}
    .btn.warn{background:var(--warn)}
    .btn.bad{background:var(--bad)}
    .btn:disabled{opacity:.5;cursor:not-allowed;filter:none;transform:none}

    .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;background:#f1f3f7;color:#374151;margin:2px;border:1px solid rgba(0,0,0,.04)}
    .namechip{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;margin:2px;font-size:12px;font-weight:800;box-shadow:0 1px 1px rgba(0,0,0,.08)}
    .swatch{display:inline-block;width:18px;height:18px;border-radius:6px;border:1px solid #cbd5e1;vertical-align:middle;margin-right:6px}
    .teamName{display:inline-flex;align-items:center;border-radius:10px;padding:5px 9px;font-weight:900;letter-spacing:.2px}
    .pill.ok{background:var(--ok-bg);color:#0b5c39}
    .pill.warn{background:var(--warn-bg);color:#8a5a08}
    .pill.bad{background:var(--bad-bg);color:#8c1e18}
    .pill.blue{background:var(--blue-bg);color:#1d4585}

    table{width:100%;border-collapse:collapse;font-size:13px}
    .rotaTable{table-layout:fixed}
    .rotaTable th:nth-child(1),.rotaTable td:nth-child(1){width:13%}
    .rotaTable th:nth-child(2),.rotaTable td:nth-child(2){width:10%}
    .rotaTable th:nth-child(3),.rotaTable td:nth-child(3){width:16%}
    .rotaTable th:nth-child(4),.rotaTable td:nth-child(4){width:19%}
    .rotaTable th:nth-child(5),.rotaTable td:nth-child(5){width:16%}
    .rotaTable th:nth-child(6),.rotaTable td:nth-child(6){width:26%}
    .rotaTable td{word-wrap:break-word}
    th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
    th{font-size:11px;color:#475569;background:#f8fafc;text-transform:uppercase;letter-spacing:.5px;font-weight:800}
    .scroll{overflow:auto}
    .week{border-left:4px solid var(--brand-2);position:relative}
    .teamblock{border:1px solid var(--line);border-radius:var(--radius-md);padding:10px 12px;margin:8px 0;background:#fbfbfd}
    .teamHead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .teamSquare{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex:none;box-shadow:0 2px 6px rgba(0,0,0,.18)}
    .roleGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .roleTile{border-radius:12px;padding:10px 12px;background:var(--tileBg,#f8fafc);border:1px solid var(--tileBorder,var(--line))}
    .roleTile.span2{grid-column:span 2}
    .roleTileLabel{display:flex;align-items:center;gap:6px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:800;margin-bottom:7px}
    .roleTileLabel svg{width:14px;height:14px;opacity:.6;flex:none}
    .roleTileNote{background:var(--warn-bg);border-color:transparent}
    .assignment{margin:6px 0;font-size:13px}
    .assignment b{display:inline-block;min-width:92px;color:var(--brand-2)}

    .toast{position:fixed;left:12px;right:12px;bottom:12px;background:var(--brand);color:#fff;padding:13px 16px;border-radius:var(--radius-md);box-shadow:var(--shadow-pop);display:none;z-index:20;border-left:3px solid var(--gold);max-width:520px;margin:0 auto}
    .hide{display:none!important}
    .loading{opacity:.6;pointer-events:none}
    .muted{color:var(--muted)}
    .dangerText{color:var(--bad);font-weight:800}
    .okText{color:var(--ok);font-weight:800}
    .previewBox{border-radius:var(--radius-md);border:1px dashed #c7cedb;padding:12px;background:#f8fafc;margin-top:10px}
    .small{font-size:12px}
    .manual-grid{display:grid;gap:10px}
    .manual-week{border:1px solid var(--line);border-radius:var(--radius-md);padding:10px;background:#f9fafb}
    .manual-team{padding:8px 0;border-top:1px solid #e5e7eb}
    .manual-team:first-child{border-top:0}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:520px){.split{grid-template-columns:1fr}}

    .modalOverlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;-webkit-backdrop-filter:blur(1px);backdrop-filter:blur(1px)}
    .modalCard{background:#fff;border-radius:var(--radius-lg);padding:20px;max-width:420px;width:100%;box-shadow:var(--shadow-pop);border-top:4px solid var(--gold)}
    .modalCard p{margin:0 0 14px;font-size:14.5px;line-height:1.5;white-space:pre-wrap}
    .modalCard input{margin-bottom:4px}
    .modalActions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

    .globalLoader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.22);z-index:80;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
    .loaderCard{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-pop);padding:18px 20px;display:flex;align-items:center;gap:12px;color:var(--brand);font-weight:900}
    .spinner{width:28px;height:28px;border-radius:50%;border:3px solid #dbe3ef;border-top-color:var(--brand);animation:spin .85s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

      <button data-tab="leave"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg><span class="navLabel">Request Leave</span></button>
      <button data-tab="requests" class="admin-only hide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span class="navLabel">Leave Approval</span></button>
      <button data-tab="editor" class="admin-only hide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><span class="navLabel">Manual Edit</span></button>
      <button data-tab="admin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/></svg><span class="navLabel">Admin Login</span></button>
      <button data-tab="settings" class="admin-only hide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09A1.65 1.65 0 0015.4 4.6a1.65 1.65 0 001.82.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span class="navLabel">Setup</span></button>

    <main id="app">
    <section id="tab-rota" class="grid"></section>
    <section id="tab-leave" class="grid hide"></section>

  </div>
  <div id="toast" class="toast"></div>

<script>
let state = { teams: [], consultants: [], leaveRequests: [], rotaVersions: [], latestVersion: null, latestRota: {meta:null,weeks:[],notLoaded:true}, latestConflicts: [], editorWeekList: null, editorWeek: null, latestExport: null };
let rotaTeamFilter = 'ALL';
let rotaLoading = false;
let editorLoading = false;
let currentTab = 'rota';
let editingLeaveId = '';
let userLeaveCache = [];
let leaveDraft = { consultantId:'', start:'', end:'', note:'' };
let leaveStatusConsultantId = '';
let leaveRequestSeq = 0;
let editorWeekNo = '';
let editorTeamId = '';
let loadingCount = 0;
let adminDataLoaded = false;
function safeSessionGet(key){ try{ return sessionStorage.getItem(key) || ''; }catch(e){ return ''; } }
function safeSessionSet(key,value){ try{ sessionStorage.setItem(key,value); }catch(e){} }
function safeSessionRemove(key){ try{ sessionStorage.removeItem(key); }catch(e){} }
function safeLocalGet(key){ try{ return localStorage.getItem(key) || ''; }catch(e){ return ''; } }
function safeLocalSet(key,value){ try{ localStorage.setItem(key,value); }catch(e){} }
function safeLocalRemove(key){ try{ localStorage.removeItem(key); }catch(e){} }
let adminPin = safeSessionGet('rotaAdminPin');
let adminUnlocked = !!adminPin;
function refreshNav(){
  qsa('.admin-only').forEach(el=>el.classList.toggle('hide', !adminUnlocked));
  const adminBtn = document.querySelector('nav button[data-tab="admin"]');
  const adminLabel = adminBtn && adminBtn.querySelector('.navLabel');
  if(adminLabel) adminLabel.textContent = adminUnlocked ? 'Admin Dashboard' : 'Admin Login';
}

function qs(sel){ return document.querySelector(sel); }
function qsa(sel){ return Array.from(document.querySelectorAll(sel)); }
function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s])); }
function selAttr(a,b){ return String(a||'')===String(b||'') ? ' selected' : ''; }
function cleanColor(v, fallback='#64748b'){ const s=String(v||'').trim(); return /^#[0-9a-fA-F]{6}$/.test(s) ? s : fallback; }
function contrastColor(hex){ hex=cleanColor(hex).replace('#',''); const r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16); return ((r*299+g*587+b*114)/1000)>160 ? '#111827' : '#ffffff'; }
function chip(person){ const name=typeof person==='string'?person:(person.name||''); const color=cleanColor(typeof person==='string'?'#64748b':person.color); return `<span class="namechip" style="background:${esc(color)};color:${contrastColor(color)}">${esc(name)}</span>`; }
function teamBadge(t){ const color=cleanColor(t.teamColor || t.ColorHex || '#0f172a','#0f172a'); return `<span class="teamName" style="background:${esc(color)};color:${contrastColor(color)}">${esc(t.teamName || t.TeamName)}</span>`; }
function tintBg_(hex, alpha){ const c=cleanColor(hex).replace('#',''); const r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16); return `rgba(${r},${g},${b},${alpha})`; }
function toast(msg){ const t=qs('#toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3500); }
function hardReloadApp(){
  // A plain reload can still be served from cache (or, on iOS, the whole page may have been
  // suspended rather than reloaded at all when reopened from the home screen). Navigating to a
  // never-before-seen URL guarantees a real network fetch of the latest deployed file.
  window.location.href = window.location.pathname + '?_r=' + Date.now();
}

function openModal_(innerHtml){
  const overlay=document.createElement('div');
  overlay.className='modalOverlay';
  overlay.innerHTML=`<div class="modalCard">${innerHtml}</div>`;
  document.body.appendChild(overlay);
  return overlay;
}
function confirmModal(message, okLabel='Confirm'){
  return new Promise(resolve=>{
    const overlay=openModal_(`<p>${esc(message)}</p><div class="modalActions"><button class="btn secondary" data-act="cancel">Cancel</button><button class="btn ok" data-act="ok">${esc(okLabel)}</button></div>`);
    const close=result=>{ overlay.remove(); resolve(result); };
    overlay.addEventListener('click', e=>{ if(e.target===overlay) close(false); });
    overlay.querySelector('[data-act="cancel"]').addEventListener('click', ()=>close(false));
    overlay.querySelector('[data-act="ok"]').addEventListener('click', ()=>close(true));
  });
}
function promptModal(message, defaultValue=''){
  return new Promise(resolve=>{
    const overlay=openModal_(`<p>${esc(message)}</p><input type="text" data-role="input" value="${esc(defaultValue)}"><div class="modalActions"><button class="btn secondary" data-act="cancel">Cancel</button><button class="btn" data-act="ok">OK</button></div>`);
    const input=overlay.querySelector('[data-role="input"]');
    const close=result=>{ overlay.remove(); resolve(result); };
    overlay.addEventListener('click', e=>{ if(e.target===overlay) close(null); });
    overlay.querySelector('[data-act="cancel"]').addEventListener('click', ()=>close(null));
    overlay.querySelector('[data-act="ok"]').addEventListener('click', ()=>close(input.value));
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') close(input.value); if(e.key==='Escape') close(null); });
    setTimeout(()=>{ input.focus(); input.select(); },30);
  });
}
function alertModal(message){
  return new Promise(resolve=>{
    const overlay=openModal_(`<p>${esc(message)}</p><div class="modalActions"><button class="btn" data-act="ok">OK</button></div>`);
    const close=()=>{ overlay.remove(); resolve(); };
    overlay.addEventListener('click', e=>{ if(e.target===overlay) close(); });
    overlay.querySelector('[data-act="ok"]').addEventListener('click', close);
  });
}

function statusPill(value){
  const text = String(value == null ? '' : value).trim() || '-';
  const key = text.toLowerCase();
  let cls = 'blue';
  if(['official','safe','approved','ok','active'].includes(key)) cls = 'ok';
  else if(['archived','pending','warning','yellow','draft'].includes(key)) cls = 'warn';
  else if(['voided','cancelled','rejected','conflict','red','inactive'].includes(key)) cls = 'bad';
  return `<span class="pill ${cls}">${esc(text)}</span>`;
}
function setLoading(on, label){
  loadingCount = Math.max(0, loadingCount + (on ? 1 : -1));
  const active = loadingCount > 0;
  const app = qs('#app');
  const loader = qs('#globalLoader');
  const txt = qs('#loaderText');
  if(txt && label) txt.textContent = label;
  if(app) app.classList.toggle('loading', active);
  if(loader) loader.classList.toggle('hide', !active);
}
function loadingLabelFor(fn){
  if(fn === 'getBootstrap') return 'Loading rota system…';
  if(fn === 'getLatestRotaWindow') return 'Loading current rota…';
  if(fn === 'getLatestRotaView') return 'Loading full rota…';
  if(fn === 'exportLatestRota') return 'Preparing rota download…';
  if(fn === 'getAdminData') return 'Loading admin tools…';
  return 'Working…';
}
// Deployed Apps Script web app URL (Deploy > Manage deployments > Web app URL).
// Calls go through fetch() as a plain JSON API instead of google.script.run, since this page is
// hosted outside script.google.com and google.script.run only works inside Apps Script's own
// sandboxed page. text/plain avoids a CORS preflight request, which Apps Script cannot answer.
const API_URL = 'https://script.google.com/macros/s/AKfycbzqRHxOZDJDrUXHm7KoZonSQ4MNoGS7dNBkz_-SrkDxBzaO_zm2p1LMuR6b9Lr7fcA/exec';
async function call(fn, ...args){
  setLoading(true, loadingLabelFor(fn));
  try{
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ fn: fn, args: args })
    });
    const res = await r.json();
    if(!res.ok) throw new Error(res.error || 'Request failed.');
    return res.result;
  }catch(err){
    toast(err.message || String(err));
    throw err;
  }finally{
    setLoading(false);
  }
}
function adminCall(fn, ...args){
  if(!adminUnlocked || !adminPin){
    toast('Enter the admin PIN first.');
    showTab('admin');
    return Promise.reject(new Error('Admin PIN required.'));
  }
  return call(fn, adminPin, ...args);
}
async function loadAdminData(){
  const data = await call('getAdminData', adminPin);
  Object.assign(state, data);
  adminUnlocked = true;
  adminDataLoaded = true;
  refreshNav();
  safeSessionSet('rotaAdminPin', adminPin);
  return data;
}
function consultantName(id){ const c=state.consultants.find(x=>x.ConsultantID===id); return c?c.Name:id; }
function teamName(id){ const t=state.teams.find(x=>x.TeamID===id); return t?t.TeamName:id; }
function activeTeams(){ return state.teams.filter(t=>t.Active==='Yes'); }
function consultantsByTeam(teamId){ return state.consultants.filter(c=>c.TeamID===teamId && (!c.InactiveFrom || c.CurrentStatus !== 'Inactive')); }
function consultantOptions(teamId, includeBlank=true){
  let list = teamId ? consultantsByTeam(teamId) : state.consultants;
  return (includeBlank?'<option value="">—</option>':'') + list.map(c=>`<option value="${esc(c.ConsultantID)}">${esc(c.Name)}</option>`).join('');
}
function consultantOptionsSelected(teamId, selectedId, includeBlank=true){
  let list = teamId ? consultantsByTeam(teamId) : state.consultants;
  return (includeBlank?'<option value="">—</option>':'') + list.map(c=>`<option value="${esc(c.ConsultantID)}"${selAttr(c.ConsultantID, selectedId)}>${esc(c.Name)}</option>`).join('');
}
function editorConsultantNameOptions(teamId){
  const list = consultantsByTeam(teamId);
  return '<option value="">Select from same team…</option>' + list.map(c=>`<option value="${esc(c.Name)}">${esc(c.Name)}</option>`).join('');
}
function safeDomId(id){ return String(id).replace(/[^a-zA-Z0-9_-]/g,'_'); }
function appendManualNameToField(sel, targetId){
  const name = sel.value;
  if(!name) return;
  const el = qs('#'+targetId);
  if(!el) return;
  const current = el.value.trim();
  const names = current ? current.split(/\n+/).map(x=>x.trim()).filter(Boolean) : [];
  if(!names.some(x=>x.toLowerCase()===name.toLowerCase())) names.push(name);
  el.value = names.join('\n');
  sel.value = '';
}
function teamOptions(includeBlank=true){ return (includeBlank?'<option value="">—</option>':'') + activeTeams().map(t=>`<option value="${esc(t.TeamID)}">${esc(t.TeamName)}</option>`).join(''); }

function rotaTeamOptions(){ return '<option value="ALL">All active teams</option>' + activeTeams().map(t=>`<option value="${esc(t.TeamID)}">${esc(t.TeamName)} only</option>`).join(''); }
function selectedRotaTeamId(){ const el=qs('#rotaTeam'); return el ? el.value : 'ALL'; }
function teamsForRotaGeneration(){ const id=selectedRotaTeamId(); return id==='ALL' ? activeTeams() : activeTeams().filter(t=>t.TeamID===id); }
function rotaManualStartWeek(){
  const id = selectedRotaTeamId();
  const startVal = qs('#rotaStart') ? qs('#rotaStart').value : '';
  if(id==='ALL' || !state.latestVersion || !startVal || !state.latestVersion.StartDate) return 1;
  const start = new Date(startVal + 'T00:00:00');
  const latestStart = new Date(String(state.latestVersion.StartDate).slice(0,10) + 'T00:00:00');
  if(isNaN(start.getTime()) || isNaN(latestStart.getTime())) return 1;
  const diffDays = Math.floor((start - latestStart) / 86400000);
  return Math.max(1, Math.floor(diffDays / 7) + 1);
}

qsa('nav button').forEach(btn=>btn.addEventListener('click',()=>showTab(btn.dataset.tab)));
async function showTab(tab){
  if((tab==='settings' || tab==='requests' || tab==='editor') && !adminUnlocked){ tab='admin'; }
  currentTab=tab;
  refreshNav();
  qsa('nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  qsa('main section').forEach(s=>s.classList.add('hide'));
  qs(`#tab-${tab}`).classList.remove('hide');
  render();
  if(['admin','requests','editor','settings'].includes(tab) && adminUnlocked && !adminDataLoaded){
    try{ await loadAdminData(); render(); }
    catch(e){ adminPin=''; adminUnlocked=false; adminDataLoaded=false; safeSessionRemove('rotaAdminPin'); refreshNav(); showTab('admin'); return; }
  }
  if(tab==='rota') await ensureLatestRotaWindowLoaded();
  if(tab==='editor') await ensureEditorWeekListLoaded();
}

function updateVersionLine(){ qs('#versionLine').textContent = state.latestVersion ? `Latest official rota: Amendment ${state.latestVersion.AmendmentNo}` : 'No official rota generated yet'; }
function markRotaStale(){ state.latestRota = state.latestVersion ? { meta: state.latestVersion, weeks: [], notLoaded: true } : { meta: null, weeks: [] }; state.editorWeekList = null; state.editorWeek = null; state.latestExport = null; editorWeekNo=''; editorTeamId=''; }
function rotaCacheKey(mode){ return state.latestVersion && state.latestVersion.VersionID ? `rota:${mode}:${state.latestVersion.VersionID}` : ''; }
function loadCachedRota(mode){
  const key = rotaCacheKey(mode); if(!key) return false;
  const raw = safeLocalGet(key); if(!raw) return false;
  try{
    const cached = JSON.parse(raw);
    if(cached && cached.meta && cached.meta.VersionID === state.latestVersion.VersionID && cached.weeks){
      state.latestRota = cached;
      return true;
    }
  }catch(e){ safeLocalRemove(key); }
  return false;
}
function saveCachedRota(mode, data){
  const key = rotaCacheKey(mode); if(!key || !data || !data.weeks) return;
  try{ safeLocalSet(key, JSON.stringify(data)); }catch(e){}
}
async function ensureLatestRotaWindowLoaded(force=false){
  if(rotaLoading) return;
  if(!force && state.latestRota && state.latestRota.viewMode==='window' && state.latestRota.weeks && state.latestRota.weeks.length && !state.latestRota.notLoaded) return;
  if(!state.latestVersion){ renderRota(); return; }
  if(!force && loadCachedRota('window')){ renderRota(); return; }
  rotaLoading = true; renderRota();
  try{
    const r = await call('getLatestRotaWindow');
    state.latestRota = r || {meta:null,weeks:[]};
    state.latestVersion = state.latestRota.meta || state.latestVersion;
    saveCachedRota('window', state.latestRota);
    updateVersionLine();
  }
  finally{ rotaLoading = false; if(currentTab==='rota') renderRota(); }
}
async function ensureLatestRotaLoaded(force=false){
  if(rotaLoading) return;
  if(!force && state.latestRota && state.latestRota.viewMode==='full' && state.latestRota.weeks && state.latestRota.weeks.length && !state.latestRota.notLoaded) return;
  if(!state.latestVersion){ renderRota(); return; }
  if(!force && loadCachedRota('full')){ renderRota(); return; }
  rotaLoading = true; renderRota();
  try{
    const r = await call('getLatestRotaView');
    state.latestRota = r || {meta:null,weeks:[]};
    state.latestRota.viewMode = 'full';
    state.latestVersion = state.latestRota.meta || state.latestVersion;
    saveCachedRota('full', state.latestRota);
    updateVersionLine();
  }
  finally{ rotaLoading = false; if(currentTab==='rota') renderRota(); }
}
async function ensureEditorWeekListLoaded(){
  if(!adminUnlocked) return;
  if(editorLoading) return;
  if(state.editorWeekList && state.editorWeekList.weeks) return;
  editorLoading = true; renderRotaEditor();
  try{
    const r = await adminCall('getRotaWeekList');
    state.editorWeekList = r || {meta:null,weeks:[]};
    state.latestVersion = state.editorWeekList.meta || state.latestVersion;
    const firstWeek=(state.editorWeekList.weeks||[])[0];
    if(!editorWeekNo && firstWeek) editorWeekNo = String(firstWeek.weekNo);
    const firstTeam = activeTeams()[0];
    if(!editorTeamId && firstTeam) editorTeamId = firstTeam.TeamID;
    state.editorWeek = null; // do not auto-load the week; manual edit loads one team only after admin taps Load.
  }
  finally{ editorLoading = false; if(currentTab==='editor') renderRotaEditor(); }
}
async function loadEditorWeek(weekNo){
  const teamId = editorTeamId || (qs('#editorTeamSelect') && qs('#editorTeamSelect').value) || '';
  return loadEditorWeekTeam(weekNo, teamId);
}
async function loadEditorWeekTeam(weekNo, teamId){
  if(!weekNo || !teamId){ toast('Select a week and a team.'); return; }
  editorLoading = true; renderRotaEditor();
  try{
    const r = await adminCall('getRotaWeekTeamView', Number(weekNo), teamId);
    state.editorWeek = r.week;
    editorWeekNo = String(weekNo);
    editorTeamId = String(teamId);
    state.latestVersion = r.meta || state.latestVersion;
  }
  finally{ editorLoading = false; if(currentTab==='editor') renderRotaEditor(); }
}

async function load(){
  try{
    state = await call('getBootstrap');
    state.editorWeekList = null; state.editorWeek = null; rotaTeamFilter = 'ALL'; adminDataLoaded = false;
    refreshNav();
    updateVersionLine();
    const hadCached = currentTab === 'rota' ? loadCachedRota('window') : false;
    render();
    if(currentTab==='rota' && !hadCached) await ensureLatestRotaWindowLoaded();
  }catch(e){
    qs('#tab-settings').innerHTML = `<div class="card"><h2>Setup required</h2><p class="sub">Create the HTML file named Index, then initialize from the Admin tab.</p></div>`;
    showTab('settings');
  }
}
async function setup(){ const r=await adminCall('setupDatabaseAdmin'); toast(r.message); await load(); }
async function loginAdmin(){
  const pin = (qs('#adminPin') && qs('#adminPin').value || '').trim();
  if(!pin){ toast('Enter admin PIN.'); return; }
  adminPin = pin;
  try{ await loadAdminData(); toast('Admin login successful.'); showTab('admin'); }
  catch(e){ adminPin=''; adminUnlocked=false; adminDataLoaded=false; safeSessionRemove('rotaAdminPin'); refreshNav(); }
}
function logoutAdmin(){ adminPin=''; adminUnlocked=false; adminDataLoaded=false; safeSessionRemove('rotaAdminPin'); refreshNav(); toast('Signed out from Admin.'); showTab('rota'); }
function renderAdminLock(title='Admin Login'){
  return `<div class="card"><h2>${esc(title)}</h2><p class="sub">Enter the admin PIN to open admin tools. Default PIN is 1234; change it after first login.</p><label>Admin PIN</label><input id="adminPin" type="password" inputmode="numeric" placeholder="Admin PIN"><div class="btns"><button class="btn" onclick="loginAdmin()">Login</button><button class="btn secondary" onclick="load()">Refresh</button></div></div>`;
}

function render(){ renderActiveTab(); }
function renderActiveTab(){
  if(currentTab==='rota') renderRota();
  else if(currentTab==='leave') renderLeave();
  else if(currentTab==='admin') renderAdmin();
  else if(currentTab==='requests') renderRequests();
  else if(currentTab==='editor') renderRotaEditor();
  else if(currentTab==='settings') renderSettings();
}

function renderRota(){
  const meta = (state.latestRota && state.latestRota.meta) || state.latestVersion;
  const allWeeks = (state.latestRota && state.latestRota.weeks) || [];
  const weeks = rotaFilteredWeeks(allWeeks);
  const mode = (state.latestRota && state.latestRota.viewMode) || 'window';
  const isFull = mode === 'full';
  const win = (state.latestRota && state.latestRota.window) || null;
  const notLoaded = meta && (!allWeeks.length || (state.latestRota && state.latestRota.notLoaded));
  const exportBox = state.latestExport ? renderExportReadyBox(state.latestExport) : '';
  const filterBar = allWeeks.length ? `<div class="card"><label>Team</label><select onchange="onRotaTeamFilterChange(this)">${rotaTeamFilterOptions()}</select></div>` : '';
  const viewNote = win && win.message ? `<p class="sub">${esc(win.message)}${win.startWeekNo ? ` Showing Week ${esc(win.startWeekNo)}–${esc(win.endWeekNo)} of ${esc(win.totalWeeks)}.` : ''}</p>` : (isFull ? '<p class="sub">Full rota view is loaded.</p>' : '');
  const body = rotaLoading
    ? '<div class="card"><div class="loaderCard" style="box-shadow:none;border:0;padding:4px 0"><span class="spinner"></span><span>Loading rota…</span></div></div>'
    : !allWeeks.length
      ? `<div class="card"><p class="muted">${meta ? 'Loading current and upcoming weeks…' : 'Generate a rota from the Admin tab.'}</p></div>`
      : adminUnlocked
        ? renderRotaTable(weeks)
        : weeks.map(renderWeekCard).join('');
  qs('#tab-rota').innerHTML = `
    <div class="card">
      <h2>${isFull ? 'Full Rota' : 'Current / Upcoming Rota'}</h2>
      ${meta ? `<p class="sub">Amendment No. ${esc(meta.AmendmentNo)} · ${esc(meta.StartDate)} to ${esc(meta.EndDate)}</p>` : `<p class="sub">No rota generated yet.</p>`}
      ${viewNote}
      <div class="btns">
        <button class="btn blue" onclick="downloadLatest()" ${meta?'':'disabled'}>Prepare Latest Rota Download</button>
        <button class="btn secondary" onclick="ensureLatestRotaWindowLoaded(true)" ${meta?'':'disabled'}>${rotaLoading && !isFull ? 'Loading…' : 'Refresh Current / Upcoming'}</button>
        <button class="btn secondary" onclick="ensureLatestRotaLoaded(true)" ${meta?'':'disabled'}>${rotaLoading && isFull ? 'Loading…' : 'View Full 52-Week Rota'}</button>
      </div>
    </div>
    ${filterBar}
    ${exportBox}
    ${body}
  `;
}
function renderExportReadyBox(r){

      <td><input type="date" id="cActiveFrom-${esc(c.ConsultantID)}" value="${esc(c.ActiveFrom || '')}" style="min-width:135px"></td>
      <td><input type="date" id="cInactiveFrom-${esc(c.ConsultantID)}" value="${esc(c.InactiveFrom || '')}" style="min-width:135px"></td>
      <td><input type="color" id="cColor-${esc(c.ConsultantID)}" value="${esc(cleanColor(c.ColorHex,'#2563eb'))}"></td>
      <td><input id="cNotes-${esc(c.ConsultantID)}" value="${esc(c.Notes || '')}" style="min-width:150px"></td>
      <td><button class="btn secondary" onclick="saveConsultantSettings('${esc(c.ConsultantID)}')">Save settings</button></td>
    </tr>`).join('')}</table></div>`;
}
async function addTeam(){ const r=await adminCall('saveTeam',{TeamName:qs('#teamName').value,ColorHex:qs('#teamColor').value,Active:'Yes'}); toast(r.message); await load(); showTab('admin'); }
async function addConsultant(){ const data={Name:qs('#consultantName').value,TeamID:qs('#consultantTeam').value,CanOffDuty:qs('#canOff').value,ColorHex:qs('#consultantColor').value,ActiveFrom:qs('#activeFrom').value,Notes:qs('#consultantNotes').value}; const r=await adminCall('saveConsultant',data); toast(r.message); await load(); showTab('admin'); }
async function updateTeamColor(id){ const t=state.teams.find(x=>x.TeamID===id); if(!t) return; const r=await adminCall('saveTeam',{TeamID:id,TeamName:t.TeamName,ColorHex:qs(`#teamColor-${id}`).value,Active:t.Active}); toast(r.message); await load(); showTab('admin'); }
async function saveConsultantSettings(id){
  const c=state.consultants.find(x=>x.ConsultantID===id); if(!c) return;
  const data={
    ConsultantID:id,
    Name:qs(`#cName-${id}`).value,
    TeamID:qs(`#cTeam-${id}`).value,
    CanOffDuty:qs(`#cOff-${id}`).value,
    CurrentStatus:qs(`#cStatus-${id}`).value,
    ActiveFrom:qs(`#cActiveFrom-${id}`).value,
    InactiveFrom:qs(`#cInactiveFrom-${id}`).value,
    ColorHex:qs(`#cColor-${id}`).value,
    Notes:qs(`#cNotes-${id}`).value
  };
  if(data.CurrentStatus==='Inactive' && !data.InactiveFrom){ toast('Inactive status needs an inactive-from date.'); return; }
  const r=await adminCall('saveConsultant',data); toast(r.message); await load(); showTab('admin');
}
async function updateConsultantColor(id){
  const c=state.consultants.find(x=>x.ConsultantID===id); if(!c) return;
  const data={ConsultantID:id,Name:c.Name,TeamID:c.TeamID,CanOffDuty:c.CanOffDuty,ColorHex:qs(`#consultantColor-${id}`).value,CurrentStatus:c.CurrentStatus,ActiveFrom:c.ActiveFrom,InactiveFrom:c.InactiveFrom,Notes:c.Notes};
  const r=await adminCall('saveConsultant',data); toast(r.message); await load(); showTab('admin');
}

function renderManualGrid(){
  const el=qs('#manualGrid'); if(!el) return;
  const count=Number(qs('#manualWeeks') ? qs('#manualWeeks').value : 0);
  const teams = teamsForRotaGeneration();
  const startWeek = rotaManualStartWeek();
  if(!count){ el.innerHTML=`<p class="muted small">Automatic generation will start from Week ${startWeek}.</p>`; return; }
  if(!teams.length){ el.innerHTML='<p class="dangerText small">Add teams and consultants first, or select a valid team.</p>'; return; }
  let html='<div class="manual-grid">';
  for(let i=0; i<count; i++){
    const w = startWeek + i;
    html += `<div class="manual-week"><b>Manual Week ${w}</b>`;
    teams.forEach(t=>{
      html += `<div class="manual-team">${teamBadge({TeamName:t.TeamName,ColorHex:t.ColorHex})}<div class="split"><div><label>Inpatient Team</label><select class="manualSelect" data-week="${w}" data-team="${esc(t.TeamID)}" data-type="team">${consultantOptions(t.TeamID,true)}</select></div><div><label>Off-duty optional</label><select class="manualSelect" data-week="${w}" data-team="${esc(t.TeamID)}" data-type="off">${consultantOptions(t.TeamID,true)}</select></div></div></div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML=html;
}
function collectManualAssignments(){
  const map={};
  qsa('.manualSelect').forEach(s=>{
    const key=`${s.dataset.week}|${s.dataset.team}`;
    if(!map[key]) map[key]={weekNo:Number(s.dataset.week),teamId:s.dataset.team,teamConsultantId:'',offConsultantId:''};
    if(s.dataset.type==='team') map[key].teamConsultantId=s.value;
    if(s.dataset.type==='off') map[key].offConsultantId=s.value;
  });
  return Object.values(map);
}
async function generateRota(){
  const data={teamId:selectedRotaTeamId(),startDate:qs('#rotaStart').value,weeks:Number(qs('#rotaWeeks').value || 52),manualSeedWeeks:Number(qs('#manualWeeks').value || 0),manualAssignments:collectManualAssignments()};
  if(!data.startDate){ toast('Choose a start date.'); return; }
  const oneTeam = data.teamId && data.teamId !== 'ALL';
  const msg = oneTeam ? 'Generate rota for the selected team only? Other teams will be copied unchanged into a new amendment.' : 'Generate a new official rota for all active teams? The current official version will be archived.';
  const ok=await confirmModal(msg); if(!ok) return;
  const r=await adminCall('startNewRota',data); toast(r.message); await load(); showTab('rota');
}
async function previewInactive(){
  const data={ConsultantID:qs('#inactiveConsultant').value,InactiveFrom:qs('#inactiveFrom').value,Notes:qs('#inactiveNote').value};
  const r=await adminCall('previewInactivity',data); qs('#inactivePreview').innerHTML=renderImpact(r);
}
async function confirmInactive(){
  const data={ConsultantID:qs('#inactiveConsultant').value,InactiveFrom:qs('#inactiveFrom').value,Notes:qs('#inactiveNote').value};
  if(!data.ConsultantID || !data.InactiveFrom){ toast('Select consultant and inactive date.'); return; }
  if(!(await confirmModal('Confirm inactivity and amend future rota if needed?'))) return;
  const r=await adminCall('confirmInactivity',data); toast(r.message); await load(); showTab('admin');
}

function renderRequests(){
  if(!adminUnlocked){ qs('#tab-requests').innerHTML = ''; return; }
  const pending = state.leaveRequests.filter(l=>l.Status==='Pending');
  const approved = state.leaveRequests.filter(l=>l.Status==='Approved');
  const history = state.leaveRequests.filter(l=>!['Pending','Approved'].includes(l.Status)).slice().sort((a,b)=>String(b.AdminDecisionDate||b.SubmittedAt||'').localeCompare(String(a.AdminDecisionDate||a.SubmittedAt||''))).slice(0,30);
  qs('#tab-requests').innerHTML = `
    <div class="card"><h2>Leave Approval</h2><p class="sub">Approval creates an amended rota if the leave is inside the current rota period. Cancelling an approved leave creates a new amendment and makes the consultant available again.</p>
      <h3>Pending</h3>${pending.length ? pending.map(renderLeaveRequestCard).join('') : '<p class="muted">No pending leave requests.</p>'}
      <h3>Approved archive</h3>${approved.length ? approved.map(renderApprovedLeaveCard).join('') : '<p class="muted">No approved leave in the archive.</p>'}
      <h3>Recent history</h3>${history.length ? history.map(renderLeaveHistoryCard).join('') : '<p class="muted">No rejected/cancelled leave yet.</p>'}
    </div>`;
}
function renderLeaveRequestCard(l){
  return `<div class="teamblock"><b>${esc(consultantName(l.ConsultantID))}</b> ${statusPill(l.Status)}<div class="small muted">${esc(teamName(l.TeamID))} · ${esc(l.StartDate)} to ${esc(l.EndDate)}</div>${l.UserNote?`<div class="small"><b>User note:</b> ${esc(l.UserNote)}</div>`:''}${l.AdminNote?`<div class="small"><b>Admin note:</b> ${esc(l.AdminNote)}</div>`:''}<div class="btns"><button class="btn secondary" onclick="previewLeave('${esc(l.LeaveID)}')">Preview</button><button class="btn ok" onclick="approveLeaveReq('${esc(l.LeaveID)}')">Approve</button><button class="btn bad" onclick="rejectLeaveReq('${esc(l.LeaveID)}')">Reject</button></div><div id="preview-${esc(l.LeaveID)}"></div></div>`;
}
function renderApprovedLeaveCard(l){
  return `<div class="teamblock"><b>${esc(consultantName(l.ConsultantID))}</b> ${statusPill(l.Status)}<div class="small muted">${esc(teamName(l.TeamID))} · ${esc(l.StartDate)} to ${esc(l.EndDate)}</div>${l.UserNote?`<div class="small"><b>User note:</b> ${esc(l.UserNote)}</div>`:''}${l.AdminNote?`<div class="small"><b>Admin note:</b> ${esc(l.AdminNote)}</div>`:''}<div class="btns"><button class="btn warn" onclick="cancelApprovedLeaveReq('${esc(l.LeaveID)}')">Cancel approved leave</button></div></div>`;
}
function renderLeaveHistoryCard(l){
  return `<div class="teamblock"><b>${esc(consultantName(l.ConsultantID))}</b> ${statusPill(l.Status)}<div class="small muted">${esc(teamName(l.TeamID))} · ${esc(l.StartDate)} to ${esc(l.EndDate)}</div>${l.UserNote?`<div class="small"><b>User note:</b> ${esc(l.UserNote)}</div>`:''}${l.AdminNote?`<div class="small"><b>Admin note:</b> ${esc(l.AdminNote)}</div>`:''}</div>`;
}
async function previewLeave(id){ const r=await adminCall('previewLeaveImpact',id); qs(`#preview-${id}`).innerHTML=renderImpact(r); }
async function approveLeaveReq(id){ const reason=(await promptModal('Override/admin note if needed. Leave blank if not needed.','')) || ''; const r=await adminCall('approveLeave',id,reason); toast(r.message); await load(); showTab('requests'); }
async function rejectLeaveReq(id){ const note=(await promptModal('Reason for rejection?','')) || ''; const r=await adminCall('rejectLeave',id,note); toast(r.message); await load(); showTab('requests'); }
async function cancelApprovedLeaveReq(id){ const note=(await promptModal('Reason for cancelling this approved leave?','')) || ''; if(!(await confirmModal('Cancel this approved leave and regenerate the rota from the affected week onward?'))) return; const r=await adminCall('cancelApprovedLeave',id,note); toast(r.message); await load(); showTab('requests'); }
function renderImpact(r){
  const cls = r.level==='Conflict'?'bad':r.level==='Warning'?'warn':r.level==='Safe'?'ok':'blue';
  return `<div class="previewBox"><span class="pill ${cls}">${esc(r.level || r.status)}</span><p>${esc(r.summary || '')}</p>${r.preview && r.preview.length ? r.preview.map(p=>`<div class="teamblock"><b>Week ${esc(p.weekNo)}</b><div class="small muted">${esc(p.period)}</div><div class="assignment"><b>Inpatient:</b> ${list(p.Team)}</div><div class="assignment"><b>OPD:</b> ${list(p.OPD)}</div><div class="assignment"><b>Off-duty:</b> ${list(p['Off-duty'])}</div><div class="assignment"><b>Leave:</b> ${list(p.Leave)}</div><div class="assignment"><b>Inactive:</b> ${list(p.Inactive)}</div></div>`).join('') : ''}${r.conflicts && r.conflicts.length ? `<h3>Warnings / conflicts</h3><ul>${r.conflicts.map(c=>`<li><b>${esc(c.Level)}</b> Week ${esc(c.WeekNo)}: ${esc(c.Message)}</li>`).join('')}</ul>` : ''}</div>`;
}


function renderRotaEditor(){
  if(!adminUnlocked){ qs('#tab-editor').innerHTML = ''; return; }
  const list = (state.editorWeekList && state.editorWeekList.weeks) || [];
  const selected = state.editorWeek;
  if(editorLoading && !list.length){ qs('#tab-editor').innerHTML = '<div class="card"><h2>Manual Edit</h2><p class="sub">Loading week list…</p></div>'; return; }
  if(!state.latestVersion){ qs('#tab-editor').innerHTML = '<div class="card"><h2>Manual Edit</h2><p class="sub">Generate a rota first, then you can manually edit a published week.</p></div>'; return; }
  if(!list.length){ qs('#tab-editor').innerHTML = `<div class="card"><h2>Manual Edit</h2><p class="sub">Week list is not loaded yet.</p><div class="btns"><button class="btn secondary" onclick="ensureEditorWeekListLoaded()">Load Weeks</button></div></div>`; return; }
  if(!editorWeekNo) editorWeekNo = String(list[0].weekNo);
  if(!editorTeamId && activeTeams()[0]) editorTeamId = activeTeams()[0].TeamID;
  const weekOptions = list.map(w=>`<option value="${esc(w.weekNo)}"${selAttr(w.weekNo, editorWeekNo)}>Week ${esc(w.weekNo)} · ${esc(w.periodExport || w.period)}</option>`).join('');
  const teamOptionsHtml = activeTeams().map(t=>`<option value="${esc(t.TeamID)}"${selAttr(t.TeamID, editorTeamId)}>${esc(t.TeamName)}</option>`).join('');
  const selectedTitle = selected && selected.teams && selected.teams[0] ? `${esc(selected.teams[0].teamName)} · Week ${esc(selected.weekNo)} · ${esc(selected.periodExport || selected.period)}` : 'Selected week/team';
  qs('#tab-editor').innerHTML = `
    <div class="card"><h2>Manual Rota Edit</h2><p class="sub">For speed on mobile, this page now loads one week and one team only. Choose the week and team, then tap Load.</p>
      <div class="row"><div><label>Select week</label><select id="editorWeekSelect" onchange="onEditorSelectionChange()">${weekOptions}</select></div><div><label>Select team</label><select id="editorTeamSelect" onchange="onEditorSelectionChange()">${teamOptionsHtml}</select></div></div>
      <div class="btns"><button class="btn secondary" onclick="loadSelectedEditorTeam()">Load / Refresh Selected Team</button></div>
      <label>Amendment reason</label><input id="manualReason" placeholder="Example: External consultant covering Team A during approved leave">
    </div>
    <div class="card"><h2>${selectedTitle}</h2>${editorLoading ? '<p class="muted">Loading selected team…</p>' : selected ? renderEditorWeek(selected) : '<p class="muted">Choose a week and team, then tap Load / Refresh Selected Team.</p>'}${selected ? '<div class="btns"><button class="btn ok" onclick="publishManualEdit()">Publish Manual Amendment</button><button class="btn secondary" onclick="loadSelectedEditorTeam()">Refresh Team</button></div>' : ''}<p class="small muted">You can select from the same team or write one name per line. Same-team consultants affect the following auto-rotation. External typed names appear as manual cover only and are not used for future auto-generation.</p></div>`;
}
function renderEditorWeek(week){
  return (week.teams||[]).map(t=>{
    const sid = safeDomId(t.teamId);
    return `<div class="teamblock" data-editor-team="${esc(t.teamId)}">
      <h3>${teamBadge(t)}</h3>
      <label>Inpatient Team</label>
      <select onchange="appendManualNameToField(this,'edit-team-${esc(sid)}')">${editorConsultantNameOptions(t.teamId)}</select>
      <textarea id="edit-team-${esc(sid)}" rows="2">${esc(namesText(t.Team))}</textarea>
      <label>OPD</label>
      <select onchange="appendManualNameToField(this,'edit-opd-${esc(sid)}')">${editorConsultantNameOptions(t.teamId)}</select>
      <textarea id="edit-opd-${esc(sid)}" rows="3">${esc(namesText(t.OPD))}</textarea>
      <label>Off-duty</label>
      <select onchange="appendManualNameToField(this,'edit-off-${esc(sid)}')">${editorConsultantNameOptions(t.teamId)}</select>
      <textarea id="edit-off-${esc(sid)}" rows="2">${esc(namesText(t['Off-duty']))}</textarea>
      <div class="assignment"><b>Leave:</b> ${namesHtml(t.Leave)}</div>
      <div class="assignment"><b>Inactive:</b> ${namesHtml(t.Inactive)}</div>
    </div>`;
  }).join('');
}

function namesText(list){ return (list||[]).map(p=>typeof p==='string'?p:(p.name||'')).join('\n'); }
function namesHtml(list){ return (list&&list.length) ? list.map(chip).join('') : '<span class="muted">-</span>'; }
function onEditorSelectionChange(){
  editorWeekNo = qs('#editorWeekSelect') ? qs('#editorWeekSelect').value : editorWeekNo;
  editorTeamId = qs('#editorTeamSelect') ? qs('#editorTeamSelect').value : editorTeamId;
  state.editorWeek = null;
  renderRotaEditor();
}
async function loadSelectedEditorTeam(){
  const weekNo = qs('#editorWeekSelect') ? qs('#editorWeekSelect').value : editorWeekNo;
  const teamId = qs('#editorTeamSelect') ? qs('#editorTeamSelect').value : editorTeamId;
  editorWeekNo = weekNo; editorTeamId = teamId;
  await loadEditorWeekTeam(weekNo, teamId);
}
function collectManualEdits(){
  const week = state.editorWeek;
  if(!week) return [];
  return (week.teams||[]).map(t=>{
    const sid = safeDomId(t.teamId);
    return {
      teamId: t.teamId,
      teamText: (qs(`#edit-team-${sid}`) || {}).value || '',
      opdText: (qs(`#edit-opd-${sid}`) || {}).value || '',
      offText: (qs(`#edit-off-${sid}`) || {}).value || ''
    };
  });
}
async function publishManualEdit(){
  const reason = (qs('#manualReason') && qs('#manualReason').value || '').trim();
  if(!editorWeekNo){ toast('Select a week first.'); return; }
  if(!(await confirmModal('Publish this manual week as a new official amendment? The edited week will stay locked and subsequent weeks will be recalculated.'))) return;
  const r = await adminCall('publishManualEditedWeek', { weekNo: Number(editorWeekNo), reason: reason, edits: collectManualEdits() });
  toast(r.message);
  await load();
  markRotaStale();
  showTab('rota');
}

function renderSettings(){
  if(!adminUnlocked){ qs('#tab-settings').innerHTML = ''; return; }
  qs('#tab-settings').innerHTML = `<div class="card"><h2>Setup</h2><p class="sub">Admin-only maintenance. Use repair only after installing an updated version or if a column/sheet is missing. It does not erase existing rota data.</p><div class="btns"><button class="btn secondary" onclick="setup()">Safe Repair / Add Missing Columns</button><button class="btn secondary" onclick="load()">Refresh</button></div></div><div class="card"><h2>Admin PIN</h2><p class="sub dangerText">Default PIN is 1234. Change it before sharing the web app link.</p><label>New admin PIN</label><input id="newAdminPin" type="password" inputmode="numeric" placeholder="4 to 8 digits"><div class="btns"><button class="btn warn" onclick="changeAdminPin()">Change Admin PIN</button></div></div><div class="card"><h2>Current Rules</h2><ul><li>Weekly rota runs Sunday to Saturday.</li><li>Each created team has one inpatient Team consultant weekly.</li><li>OPD is flexible and can be covered by 1–9 consultants per team whenever staffing allows.</li><li>Off-duty is optional, but the same consultant must never be Off-duty two weeks in a row.</li><li>Off-duty is skipped when there are only 2 available consultants, or when assigning it would repeat the same consultant Off-duty two weeks in a row.</li><li>Inpatient Team should not be assigned to the same consultant two weeks in a row unless all other consultants in that team are unavailable because of Leave/Inactive status.</li><li>Users can check whether their leave dates overlap with another leave request in the same team; this does not simulate the rota.</li><li>Leave only changes rota after admin approval.</li><li>Inactive consultant is removed from assignments from the effective week onward.</li><li>Team and consultant colors are chosen by admin and carried into the mobile rota and Word export.</li><li>Manual Edit can publish a corrected week, then recalculate subsequent weeks. Same-team selected consultants influence future rotation; external typed cover names are display-only.</li><li>Wrong official versions should be voided/restored, not hard-deleted.</li><li>Admin Login is required before Setup, Leave Approval, and Manual Edit appear.</li><li>Admin pages and admin server actions require an admin PIN.</li></ul></div>`;
}
async function changeAdminPin(){
  const pin = (qs('#newAdminPin') && qs('#newAdminPin').value || '').trim();
  if(!/^\d{4,8}$/.test(pin)){ toast('PIN must be 4 to 8 digits.'); return; }
  const r = await adminCall('updateAdminPin', pin);
  adminPin = pin;
  safeSessionSet('rotaAdminPin', adminPin);
  toast(r.message);
  render();
}

window.addEventListener('DOMContentLoaded', () => {
  qs('#tab-rota').innerHTML = '<div class="card"><div class="loaderCard" style="box-shadow:none;border:0;padding:4px 0"><span class="spinner"></span><span>Loading rota system…</span></div></div>';
  load();
});
</script>
</body>
</html>
